  <script>
    const T = {
      es: { title: "Préstamos y sus Partes", subtitle: "Una guía progresiva para quienes no somos contadores — desde los conceptos básicos hasta los principios matemáticos de los pagos mensuales.",
        toc_series: 'Serie de Amortización de Préstamos',
        toc_parts: [
          { label: 'Parte 1: Préstamos y sus Partes', url: null },
          { label: 'Parte 2: Calculadora', url: '/posts/amortization-calculator/' },
          { label: 'Parte 3: El Redondeo es Lógica de Dominio', url: '/posts/rounding-is-domain-logic/' },
        ],
        toc_intro: 'Este es el primero de tres artículos que construyen una comprensión completa de la amortización de préstamos — desde el vocabulario que necesita un prestatario, hasta la matemática de la fórmula de pago, hasta las decisiones de ingeniería de software sobre redondeo y precisión que determinan cómo funcionan los sistemas financieros reales.',
        toc_l1_intro: 'Sin requisitos previos. Cubre el vocabulario y la mecánica para entender un estado de cuenta y seguir una tabla de amortización paso a paso.',
        toc_l2_intro: 'Profundiza en la matemática financiera. Deriva la fórmula del pago desde principios fundamentales e introduce Newton-Raphson para préstamos con días irregulares.',
        toc_l1_items: [
          ['Monto Financiado', 'El total prestado, incluyendo los cargos incorporados al saldo inicial'],
          ['Duración del Préstamo', 'Cómo el plazo se convierte en un número fijo de cuotas mensuales'],
          ['APR', 'Por qué la tasa se expresa anualmente y cómo se deriva la tasa mensual'],
          ['Pago Mensual', 'La fórmula cerrada que produce un pago fijo y lleva el saldo a cero'],
          ['Amortización', 'Cómo cada pago se divide entre intereses y capital, y cómo esa proporción cambia con el tiempo'],
          ['Métodos de Amortización', 'Las tres convenciones de días — 30/360, Actual/365 y Actual/Actual — y cuándo aplica cada una'],
          ['Ejemplo Práctico', 'Comparación paso a paso de ambos métodos en el mismo préstamo de $10,000'],
        ],
        toc_l2_items: [
          ['Valor del Dinero en el Tiempo', 'Por qué un dólar hoy vale más que un dólar futuro, y cómo descontar pagos'],
          ['La Tasa Periódica', 'Conversión del APR a tasa mensual y la convención detrás de esa división'],
          ['Valor Presente de una Anualidad', 'La matemática que conecta una serie de pagos iguales con un valor presente único'],
          ['Derivación de la Fórmula', 'Derivación algebraica paso a paso de M = PV × [r(1+r)ⁿ / ((1+r)ⁿ − 1)]'],
          ['¿Solo para 30/360?', 'Por qué los días variables rompen la serie geométrica y eliminan la solución cerrada'],
          ['NPV como Función de M', 'Plantear el problema como búsqueda de raíces: encontrar M donde el balance final sea cero'],
          ['La Derivada f′(M)', 'Qué mide geométricamente, por qué f(M) es lineal y cómo calcularla periodo a periodo'],
          ['Newton-Raphson', 'El algoritmo iterativo y por qué esta f(M) converge en una sola iteración'],
        ],
        layer1: "Capa 1", layer1Title: "Entendimiento Básico", layer1Intro: 'Todos conocemos lo que es el <em>monthly payment</em>: la cantidad que pagamos cada mes por un dinero prestado. Pero para entender a profundidad por qué ese número es lo que es, debemos comprender varios conceptos fundamentales.', h_financed: "Monto Financiado", p_financed: 'El monto financiado es el total del dinero que usted recibe en préstamo, más cualquier cargo que se incorpore al saldo inicial. Estos cargos pueden incluir impuestos, tasas o comisiones necesarias para formalizar el préstamo. Es importante distinguir este número del precio del bien que está adquiriendo.', lbl_example: "Ejemplo", lbl_note: "Nota", example_financed: 'Un vehículo tiene un precio de $17,000, pero los impuestos y tasas suman $700. El total antes de cualquier pago inicial es $17,700. Si usted da un avance de $500, su monto financiado sería: <strong>$17,700 − $500 = $17,200</strong>.', note_financed: 'Las leyes de cada país o estado regulan qué cargos pueden incluirse en el monto financiado. Al tomar un préstamo, preste atención a los cargos añadidos al capital para tener claridad sobre la estructura de su obligación.', h_duration: "Duración del Préstamo", p_duration1: 'Cuando hablamos de pagos "mensuales", la unidad que define formalmente la duración del préstamo es el mes, incluso cuando se expresa en años. Por ejemplo, un préstamo a 5 años equivale a 60 cuotas mensuales.', p_duration2: 'Si bien la mayoría de los préstamos operan con intervalos mensuales, también es posible estructurar préstamos con intervalos anuales. Por ejemplo, un préstamo de $1,000,000 a 10 años con pagos anuales tendría 10 intervalos.', p_duration3: 'El término o intervalo define <em>cuándo</em> se evalúa el préstamo para asignar una porción del pago al capital y otra a los intereses devengados. Este proceso se llama amortización, y lo veremos en detalle más adelante.', h_apr: "Interés o Tasa de Porcentaje Anual (APR)", p_apr1: 'Este es posiblemente el concepto más confuso, no por casualidad sino por diseño. El interés se presenta usualmente, y en muchos casos por ley, en términos anuales. Por ejemplo, "al 6.55%".', p_apr2: 'En los préstamos de consumo estándar en EE.UU., el interés se calcula en cada periodo como <em>interés simple sobre el saldo pendiente</em> — no se capitaliza. Pagas todos los intereses acumulados cada mes, por lo que los intereses impagos nunca se acumulan sobre sí mismos. La tasa mensual utilizada en los cálculos de esta guía es APR/12 — una convención que adoptó la industria, no una equivalencia matemática.', p_apr3: 'Tener clara esta convención es importante: las tablas de amortización de esta guía aplican APR/12 cada mes sobre el saldo pendiente. Profundizaremos en esto en la Capa 2.', h_monthly: 'Pago Mensual', p_monthly1: 'El pago mensual es la cantidad fija que pagas cada periodo durante la vida del préstamo. Se calcula de manera que, al final del último periodo, tu saldo llegue exactamente a cero — ni más, ni menos. Cada pago cubre dos cosas: los intereses del periodo y una porción del capital pendiente.', p_monthly2: 'La fórmula estándar — que asume periodos iguales de 30 días — da una respuesta exacta en un solo paso. Aquí <strong>M</strong> es el pago mensual, <strong>PV</strong> es el monto del préstamo, <strong>r</strong> es APR/12, y <strong>n</strong> es el número total de pagos:', p_monthly3: 'Para nuestro ejemplo — $10,000 al 5% APR a 60 meses — r = 0.05/12 = 0.004167, (1+r)⁶⁰ = 1.28336, y M = $10,000 × (0.004167 × 1.28336) / (1.28336 − 1) = <strong>$188.71</strong>.', p_monthly4: 'Para préstamos con conteo real de días, donde cada mes tiene una cantidad diferente de días, esta fórmula no funciona directamente. La Capa 2 la deriva desde los principios fundamentales y muestra cómo manejar ambos casos.', h_amort: "Amortización", p_amort: 'La amortización de un préstamo es el proceso mediante el cual, en cada periodo, se determina qué porción de tu pago reduce el capital (principal) y qué porción corresponde a los intereses. De un pago mensual fijo, la proporción destinada a intereses <strong>disminuye</strong> con el tiempo mientras que la proporción destinada al principal <strong>aumenta</strong>.', h_methods: "Métodos de Amortización", p_methods_intro: 'El método de amortización determina cómo se calcula el interés de cada periodo. Los más comunes son:', p_30360: '<strong>30/360 (préstamo regular o anualidad):</strong> Simplifica la matemática asumiendo que todos los meses tienen 30 días y el año tiene 360 días. La igualdad de periodos es lo que hace posible una fórmula cerrada — permite que la serie de pagos forme una progresión geométrica perfecta. Lo que hace que los pagos <em>aparezcan</em> idénticos no es el método sino la precisión: cuando M se aplica con precisión flotante completa y se redondea solo para visualización, el error de redondeo acumulado permanece invisible y el saldo cierra en $0.00. Este es el modelo de hoja de cálculo. En el servicio real, donde el interés se redondea al centavo en cada paso, el último pago aún se ajusta ligeramente.', p_actual365: '<strong>Actual/365 (préstamo irregular):</strong> Utiliza el número real de días de cada mes, pero asume que todos los años tienen 365 días (ignora años bisiestos).', p_actualactual: '<strong>Actual/Actual (ISDA):</strong> Utiliza el número real de días de cada mes y el número real de días del año (365 o 366 según corresponda). Es el método más preciso pero también el más complejo.', note_irregular: 'Los préstamos irregulares (actual/365 y actual/actual) no tienen una fórmula cerrada simple para el pago mensual. La fórmula estándar del método 30/360 se usa frecuentemente como estimación inicial, y luego se ajusta mediante métodos numéricos como Newton-Raphson (ver Capa 2).', h_practical: "Ejemplo Práctico", p_practical: 'Para comparar ambos métodos, usaremos las mismas condiciones iniciales:', ass1: "Préstamo: $10,000", ass2: "APR: 5%", ass3: "Plazo: 5 años (60 meses)", ass4: "Inicio del préstamo: 1 de abril", ass5: "Primer pago: 30 de abril", h_ex30360: "Ejemplo con 30/360", p_ex30360_intro: 'Con este método, el interés de cada periodo se calcula como:', formula_30360: '<em>Interés</em> = Balance × (APR / 360) × 30', iter_lbl1: "Iteración 1", iter_lbl2: "Iteración 2", i130_1: "Balance inicial: $10,000", i130_2: "Interés: $10,000 × (5%/360) × 30 = $41.67", i130_3: "Pago mensual: $188.71", i130_4: "Principal: $188.71 − $41.67 = $147.04", i130_5: "Balance final: $9,852.96", i230_1: "Balance inicial: $9,852.96", i230_2: "Interés: $9,852.96 × (5%/360) × 30 = $41.05", i230_3: "Pago mensual: $188.71", i230_4: "Principal: $188.71 − $41.05 = $147.66", i230_5: "Balance final: $9,705.30", p_process30: 'Este proceso se repite durante 60 periodos hasta que el balance llega a $0.00:', th_num: "#", th_days: "Días", th_payment: "Pago", th_interest: "Interés", th_principal: "Principal", th_balance: "Balance", h_exActual: "Ejemplo con Actual/365", p_exActual_intro: 'Con este método, el interés usa los días reales de cada mes:', formula_actual: '<em>Interés</em> = Balance × (APR / 365) × días reales del periodo', i1a_lbl: "Iteración 1 (abril, 30 días)", i2a_lbl: "Iteración 2 (mayo, 31 días)", i1a_1: "Balance inicial: $10,000", i1a_2: "Interés: $10,000 × (5%/365) × 30 = $41.10", i1a_3: "Pago mensual: $188.74", i1a_4: "Principal: $188.74 − $41.10 = $147.64", i1a_5: "Balance final: $9,852.36", i2a_1: "Balance inicial: $9,852.36", i2a_2: "Interés: $9,852.36 × (5%/365) × 31 = $41.84", i2a_3: "Pago mensual: $188.74", i2a_4: "Principal: $188.74 − $41.84 = $146.90", i2a_5: "Balance final: $9,705.46", p_processAct: 'Observe cómo la columna de días varía con la duración real de cada mes — y aun así el pago se mantiene en $188.74 todos los meses. Este es el mismo efecto de precisión que en 30/360: el pago es igual no por la convención de días, sino porque M se calculó exactamente y se aplica con precisión flotante completa. Si se redondea el interés al centavo en cada paso, el último pago volverá a ajustarse ligeramente.', layer2: "Capa 2", layer2Title: "Entendimiento Matemático Financiero", p_l2intro1: 'En la Capa 1 aprendimos qué es la amortización y vimos cómo funciona iterando mes a mes. Ahora la pregunta es: <strong>¿cómo se calcula ese pago mensual fijo antes de empezar la tabla? ¿De dónde sale el número $188.71?</strong>', p_l2intro2: 'La respuesta requiere entender un principio fundamental: el valor del dinero en el tiempo.', h_timeValue: "El Valor del Dinero en el Tiempo", p_tv1: 'Un dólar hoy vale más que un dólar mañana. ¿Por qué? Porque el dólar de hoy puede ser invertido y generar rendimiento. Si depositas $100 hoy a una tasa del 5% anual, dentro de un año tendrás $105. Este concepto funciona en ambas direcciones:', p_fv: '<strong>Valor Futuro (FV):</strong> Si tengo $100 hoy, ¿cuánto tendré en el futuro? La respuesta es FV = PV × (1 + r), donde PV es el valor presente y r es la tasa de interés del periodo.', p_pv: '<strong>Valor Presente (PV):</strong> Si recibiré $105 en un año, ¿cuánto vale eso hoy? La respuesta es PV = FV / (1 + r). En nuestro ejemplo: PV = $105 / 1.05 = $100.', p_discount: 'El proceso de convertir un valor futuro a su equivalente presente se llama "descontar", y la tasa utilizada se llama "tasa de descuento".', h_periodic: "La Tasa Periódica", p_per1: 'Como vimos en la Capa 1, el APR se expresa anualmente pero los pagos son mensuales. Necesitamos convertir la tasa anual a una tasa mensual. En el método 30/360, la conversión es directa:', formula_periodic: '<em>r</em> = APR / 12', p_per2: 'Para nuestro ejemplo con APR = 5%: r = 0.05 / 12 = 0.004167 (≈ 0.4167% mensual).', p_per3: 'Es importante notar que esta división simple es una <em>convención</em>, no una equivalencia matemática exacta. Aplicar 0.4167% mensual durante 12 meses sobre un saldo fijo daría (1 + 0.004167)¹² − 1 ≈ 5.116% anual — ligeramente por encima del 5% declarado. Para nuestro préstamo amortizado esto no tiene efecto práctico, ya que APR/12 es la tasa periódica acordada y el saldo se reduce cada mes.', h_annuity: "Valor Presente de una Anualidad", p_ann1: 'Un préstamo con pagos mensuales fijos es, matemáticamente, una <strong>anualidad</strong>: una serie de pagos iguales realizados a intervalos regulares. La pregunta central es:', lbl_keyQ: "Pregunta clave", keyQuestion: '¿Qué monto de pago fijo <strong>M</strong>, repetido durante <strong>n</strong> periodos a una tasa <strong>r</strong>, tiene un valor presente igual al monto financiado <strong>PV</strong>?', p_ann2: 'Cada uno de los pagos futuros tiene un valor presente diferente, ya que cada uno está más lejos en el tiempo:', formula_series: 'PV = M/(1+r)¹ + M/(1+r)² + M/(1+r)³ + ... + M/(1+r)ⁿ', p_ann3: 'Esta es una serie geométrica. Factorizándola, obtenemos la fórmula del valor presente de una anualidad:', formula_annuity: 'PV = M × [<em>(1 − (1+r)⁻ⁿ) / r</em>]', h_derivM: "Derivación de la Fórmula del Pago Mensual", p_derivM1: 'Despejando M:', formula_M: 'M = PV × [<em>r × (1+r)ⁿ</em> / <em>((1+r)ⁿ − 1)</em>]', p_derivM2: 'Verifiquémosla con nuestro ejemplo:', step_data: "Datos", step_data_v: "PV = $10,000 &nbsp;|&nbsp; r = 0.05/12 = 0.0041667 &nbsp;|&nbsp; n = 60", step1: "Paso 1", step1v: "(1 + r)ⁿ = (1.0041667)⁶⁰ = 1.28336", step2: "Paso 2", step2v: "Numerador: r × (1+r)ⁿ = 0.0041667 × 1.28336 = 0.005347", step3: "Paso 3", step3v: "Denominador: (1+r)ⁿ − 1 = 1.28336 − 1 = 0.28336", step4: "Paso 4", step4v: "M = $10,000 × (0.005347 / 0.28336) = $10,000 × 0.018871 = <strong>$188.71</strong>", p_exact: '<strong>Exactamente el número que usamos en la Capa 1.</strong>', h_why30: "¿Por Qué Esta Fórmula Solo Aplica al Método 30/360?", p_why30_1: 'La derivación anterior asume que todos los periodos son iguales: cada mes tiene exactamente 30 días. Esto permite que la serie de pagos forme una serie geométrica perfecta con una razón común constante.', p_why30_2: 'En los métodos actual/365 o actual/actual, cada periodo tiene una duración diferente (28, 29, 30 o 31 días). Esto significa que la tasa efectiva de cada periodo es distinta y la serie ya no es geométrica. No existe una fórmula cerrada para despejar M directamente.', p_why30_3: 'En estos casos, necesitamos definir una función que relacione M con el balance final (que debe ser cero) y usar métodos numéricos iterativos para encontrar el valor correcto.', h_npv: "Valor Presente Neto (NPV) como función de M", p_npv1: 'Para un préstamo irregular, definimos una función f(M) que representa el balance residual después de todos los pagos. Si M es correcto, f(M) = 0. Si M es demasiado bajo, el balance queda positivo (debemos dinero). Si M es demasiado alto, queda negativo (pagamos de más).', p_npv2: 'Dado que cada pago M reduce el balance de forma proporcional, f(M) es una función <strong>lineal</strong> de M. Esto es clave y se puede ver en la siguiente gráfica:', caption_npv: 'Balance residual f(M) vs. pago mensual M. Observe que la relación es una recta: mayor pago → menor balance final. El punto donde la recta cruza cero es el pago correcto ($188.74).', p_npv3: 'La linealidad tiene una consecuencia poderosa: si trazamos la recta tangente a f(M) en cualquier punto, esa tangente <strong>es</strong> la función misma. Esto significa que Newton-Raphson encontrará la raíz en una sola iteración.', h_deriv: "¿Qué es la derivada en este contexto?", p_deriv1: 'La derivada f′(M) mide <strong>cuánto cambia el balance final por cada dólar que cambias en el pago mensual</strong>. Geométricamente, es la <em>pendiente</em> de la recta f(M).', p_deriv2: 'Si f′(M) = −53, significa que por cada $1 que aumentes el pago mensual, el balance final disminuye en $53. Esto tiene sentido intuitivo: un dólar extra por mes, durante 60 meses, reduce el balance más de $60 porque ese dólar extra también reduce los intereses futuros.', caption_deriv: 'La pendiente de la recta f(M) es constante: cada $1 adicional en el pago mensual reduce el balance final en aproximadamente $53. Esta pendiente es f′(M), la derivada.', h_nr: "Newton-Raphson: Encontrar la Raíz", p_nr_intro: 'El método de Newton-Raphson es un algoritmo iterativo para encontrar raíces de funciones (puntos donde f(M) = 0). Funciona así:', nr_s1: "Paso 1", nr_s1v: "Comenzar con una estimación inicial M₀ (usamos la fórmula 30/360).", nr_s2: "Paso 2", nr_s2v: "Evaluar f(M₀) y f′(M₀) — la función y su derivada (pendiente) en ese punto.", nr_s3: "Paso 3", nr_s3v: "Trazar la recta tangente y saltar a donde cruza cero:", formula_nr: 'M₁ = M₀ − <em>f(M₀) / f′(M₀)</em>', nr_s4: "Paso 4", nr_s4v: "Repetir hasta que |f(M)| sea menor que una tolerancia (por ejemplo, $0.01).", p_nr_conv: 'En general, Newton-Raphson converge cuadráticamente: si el error es $1.00, la siguiente iteración lo reduce a ~$0.01. Pero como nuestro f(M) es una recta, la tangente es idéntica a la función — <strong>la primera iteración ya nos da la respuesta exacta</strong>.', caption_nr: 'Newton-Raphson en acción: partimos de M₀ = $188.71 (fórmula 30/360), trazamos la tangente (que es la recta misma), y saltamos directamente a M₁ = $188.74 donde f(M) = 0.', h_app: "Aplicación Concreta", p_app_intro: 'Retomemos nuestro ejemplo ($10,000, 5%, 60 meses, inicio 1 de abril):', p_app1: '<strong>Estimación inicial (fórmula 30/360):</strong> M₀ = $188.71. Al simular los 60 periodos con días reales, el balance final resulta f(M₀) ≈ +$1.62. El balance es ligeramente positivo, lo que indica que estamos pagando un poco de menos — aún queda un pequeño saldo por pagar después del pago 60.', p_app2: '<strong>Iteración 1:</strong> Con f(M₀) = +$1.62 y f′(M₀) ≈ −53.27, Newton-Raphson calcula M₁ = $188.71 − (+1.62 / −53.27) = $188.71 + 0.03 = <strong>$188.74</strong>. Al simular nuevamente: f(M₁) ≈ $0.003 — prácticamente cero. Convergencia alcanzada.', p_app3: 'El resultado $188.74 es exactamente el pago que usamos en la tabla actual/365 de la Capa 1.', h_formalDeriv: "La Derivada f′(M): Cálculo Formal", p_fd1: 'Para aplicar Newton-Raphson necesitamos f′(M). Dado que el balance de cada periodo depende del anterior, propagamos la sensibilidad iterativamente:', formula_fd: 'dBalance<sub>i+1</sub>/dM = dBalance<sub>i</sub>/dM × (1 + APR × días<sub>i</sub>/365) − 1', p_fd2: 'Se inicializa con dBalance₀/dM = 0 (el monto financiado no depende de M) y se propaga periodo a periodo. Al final de los 60 periodos, f′(M) = dBalance₆₀/dM nos da la pendiente que necesitamos.', p_fd3: 'Dado que cada iteración simplemente multiplica por un factor mayor a 1 y resta 1, el resultado es un número negativo cuya magnitud crece con el número de periodos. Para nuestro ejemplo, f′(M) ≈ −53.27, confirmando que cada $1 adicional en M reduce el balance final en ~$53.', h_summary: "Resumen: El Mapa Completo", sum1: 'El concepto de <strong>valor del dinero en el tiempo</strong> nos permite comparar pagos futuros con el monto prestado hoy.', sum2: 'Para préstamos regulares (30/360), la serie de pagos forma una <strong>serie geométrica</strong> que se resuelve con una fórmula cerrada: M = PV × [r(1+r)ⁿ / ((1+r)ⁿ − 1)].', sum3: 'Para préstamos irregulares (actual/365, actual/actual), la fórmula cerrada no aplica. Se usa la fórmula 30/360 como <strong>estimación inicial</strong> y Newton-Raphson ajusta el resultado — en la práctica, en una sola iteración porque f(M) es lineal.', sum4: 'La <strong>tabla de amortización</strong> es simplemente la aplicación iterativa de ese pago calculado, distribuyendo cada cuota entre intereses y capital.', h_teaser: "Calculadora Interactiva", p_teaser: 'Aplica lo que aprendiste. Ingresa los parámetros de cualquier préstamo, observa a Newton-Raphson converger en tiempo real y comprueba por qué los pagos reales difieren de las fórmulas del libro.', teaserCta: 'Abrir la calculadora →', ch_fM: "f(M) = Balance residual", ch_root: "Raíz: M = $188.74", ch_xM: "Pago mensual (M)", ch_yBal: "Balance residual f(M)", ch_pointA: "Punto A", ch_pointB: "Punto B", ch_slopeLabel: "Pendiente (derivada)", ch_tangent: "Tangente en M₀" },
      en: { title: "Loans and Their Components", subtitle: "A progressive guide for the non-accountant — from basic concepts to the mathematical principles behind monthly payments.",
        toc_series: 'Loan Amortization Series',
        toc_parts: [
          { label: 'Part 1: Loans and Their Components', url: null },
          { label: 'Part 2: Calculator', url: '/posts/amortization-calculator/' },
          { label: 'Part 3: Rounding Is Domain Logic', url: '/posts/rounding-is-domain-logic/' },
        ],
        toc_intro: 'This is the first of three articles building a complete, ground-up understanding of loan amortization — from the vocabulary a borrower needs, to the mathematics behind the payment formula, to the software engineering decisions about rounding and precision that determine how real financial systems behave.',
        toc_l1_intro: 'No prerequisites. Covers the vocabulary and mechanics you need to understand a loan statement and follow a payment schedule step by step.',
        toc_l2_intro: 'Goes deeper into the financial math. Derives the payment formula from first principles and introduces Newton-Raphson for loans with irregular day counts.',
        toc_l1_items: [
          ['Financed Amount', 'The total borrowed, including any charges rolled into the initial balance'],
          ['Loan Duration', 'How the term length maps to a fixed number of monthly installments'],
          ['APR', 'Why the rate is stated annually and how the monthly rate is derived from it'],
          ['Monthly Payment', 'The closed-form formula that produces a fixed payment and closes the balance at zero'],
          ['Amortization', 'How each payment splits between interest and principal, and how that split shifts over time'],
          ['Amortization Methods', 'The three day-count conventions — 30/360, Actual/365, and Actual/Actual — and when each applies'],
          ['Practical Example', 'Side-by-side walkthrough of both methods on the same $10,000 loan'],
        ],
        toc_l2_items: [
          ['Time Value of Money', 'Why a dollar today is worth more than a future dollar, and how to discount future payments'],
          ['The Periodic Rate', 'Converting APR to a monthly rate, and the convention behind that division'],
          ['Present Value of an Annuity', 'The math connecting a series of equal payments to a single present value'],
          ['Deriving the Payment Formula', 'Step-by-step algebraic derivation of M = PV × [r(1+r)ⁿ / ((1+r)ⁿ − 1)]'],
          ['Why Only 30/360?', 'Why varying day counts break the geometric series and eliminate the closed-form solution'],
          ['NPV as a Function of M', 'Framing the problem as root-finding: find M where the final balance equals zero'],
          ['The Derivative f′(M)', 'What it measures geometrically, why f(M) is linear, and how to compute it period by period'],
          ['Newton-Raphson', 'The iterative algorithm, and why this particular f(M) converges in a single step'],
        ],
        layer1: "Layer 1", layer1Title: "Basic Understanding", layer1Intro: 'We all know what a <em>monthly payment</em> is: the amount we pay each month for borrowed money. But to truly understand why that number is what it is, we need to grasp several fundamental concepts.', h_financed: "Financed Amount", p_financed: "The financed amount is the total money you receive as a loan, plus any charges incorporated into the initial balance. These charges may include taxes, fees, or commissions required to formalize the loan. It's important to distinguish this number from the price of the asset you're acquiring.", lbl_example: "Example", lbl_note: "Note", example_financed: 'A vehicle is priced at $17,000, but taxes and fees add $700. The total before any down payment is $17,700. If you put $500 down, your financed amount would be: <strong>$17,700 − $500 = $17,200</strong>.', note_financed: 'Laws in each country or state regulate which charges can be included in the financed amount. When taking out a loan, pay attention to charges added to the principal for clarity on the structure of your obligation.', h_duration: "Loan Duration", p_duration1: 'When we talk about "monthly" payments, the unit that formally defines the loan\'s duration is the month, even when expressed in years. For example, a 5-year loan equals 60 monthly installments.', p_duration2: 'While most loans operate with monthly intervals, it\'s also possible to structure loans with annual intervals. For example, a $1,000,000 loan over 10 years with annual payments would have 10 intervals.', p_duration3: 'The term or interval defines <em>when</em> the loan is evaluated to allocate a portion of the payment to principal and another to accrued interest. This process is called amortization, and we\'ll cover it in detail below.', h_apr: "Interest or Annual Percentage Rate (APR)", p_apr1: 'This is possibly the most confusing concept, not by accident but by design. Interest is usually presented, and in many cases required by law, in annual terms. For example, "at 6.55%".', p_apr2: 'For standard US consumer loans, interest is calculated each period as <em>simple interest on the outstanding balance</em> — it does not compound. You pay all accrued interest every month, so unpaid interest never accumulates on itself. The monthly rate used in the calculations throughout this guide is APR/12 — a convention the industry agreed on, not a mathematical equivalence.', p_apr3: 'Keeping this convention in mind is important: the amortization tables throughout this guide apply APR/12 each month to the outstanding balance. We\'ll build on this in Layer 2.', h_monthly: 'Monthly Payment', p_monthly1: 'The monthly payment is the fixed amount you pay each period for the life of the loan. It is calculated so that by the final period your balance reaches exactly zero — no more, no less. Each payment covers two things: the interest charged for that period, and a portion of the principal you still owe.', p_monthly2: 'The standard formula — which assumes equal 30-day periods — gives you an exact answer in one step. Here <strong>M</strong> is the monthly payment, <strong>PV</strong> is the loan amount, <strong>r</strong> is APR/12, and <strong>n</strong> is the total number of payments:', p_monthly3: 'For our example — $10,000 at 5% APR over 60 months — r = 0.05/12 = 0.004167, (1+r)⁶⁰ = 1.28336, and M = $10,000 × (0.004167 × 1.28336) / (1.28336 − 1) = <strong>$188.71</strong>.', p_monthly4: 'For loans that use actual day counts, where each month has a different number of days, this formula no longer works directly. Layer 2 derives it from first principles and shows how to handle both cases.', h_amort: "Amortization", p_amort: 'Loan amortization is the process by which, in each period, we determine what portion of your payment reduces the principal and what portion corresponds to interest. From a fixed monthly payment, the portion going to interest <strong>decreases</strong> over time while the portion going to principal <strong>increases</strong>.', h_methods: "Amortization Methods", p_methods_intro: 'The amortization method determines how interest is calculated for each period. The most common are:', p_30360: '<strong>30/360 (regular loan or annuity):</strong> Simplifies the math by assuming all months have 30 days and the year has 360 days. Equal periods are what make a closed-form formula possible — they let the payment series form a perfect geometric progression. What makes payments <em>appear</em> identical is not the method but the precision: when M is carried with full floating-point precision and rounded only for display, the accumulated rounding error stays invisible and the balance closes to $0.00. This is the spreadsheet model. In real servicing, where interest is rounded to the penny at each step, the last payment still adjusts slightly.', p_actual365: '<strong>Actual/365 (irregular loan):</strong> Uses the actual number of days in each month, but assumes all years have 365 days (ignores leap years).', p_actualactual: '<strong>Actual/Actual (ISDA):</strong> Uses the actual number of days in each month and the actual number of days in the year (365 or 366 as applicable). The most precise but also most complex method.', h_practical: "Practical Example", p_practical: 'To compare both methods, we\'ll use the same initial conditions:', ass1: "Loan: $10,000", ass2: "APR: 5%", ass3: "Term: 5 years (60 months)", ass4: "Loan start: April 1st", ass5: "First payment: April 30th", h_ex30360: "Example with 30/360", p_ex30360_intro: 'With this method, the interest for each period is calculated as:', formula_30360: '<em>Interest</em> = Balance × (APR / 360) × 30', iter_lbl1: "Iteration 1", iter_lbl2: "Iteration 2", i130_1: "Starting balance: $10,000", i130_2: "Interest: $10,000 × (5%/360) × 30 = $41.67", i130_3: "Monthly payment: $188.71", i130_4: "Principal: $188.71 − $41.67 = $147.04", i130_5: "Ending balance: $9,852.96", i230_1: "Starting balance: $9,852.96", i230_2: "Interest: $9,852.96 × (5%/360) × 30 = $41.05", i230_3: "Monthly payment: $188.71", i230_4: "Principal: $188.71 − $41.05 = $147.66", i230_5: "Ending balance: $9,705.30", p_process30: 'This process repeats for 60 periods until the balance reaches $0.00:', th_num: "#", th_days: "Days", th_payment: "Payment", th_interest: "Interest", th_principal: "Principal", th_balance: "Balance", h_exActual: "Example with Actual/365", p_exActual_intro: 'With this method, interest uses the actual days in each month:', formula_actual: '<em>Interest</em> = Balance × (APR / 365) × actual days in period', i1a_lbl: "Iteration 1 (April, 30 days)", i2a_lbl: "Iteration 2 (May, 31 days)", i1a_1: "Starting balance: $10,000", i1a_2: "Interest: $10,000 × (5%/365) × 30 = $41.10", i1a_3: "Monthly payment: $188.74", i1a_4: "Principal: $188.74 − $41.10 = $147.64", i1a_5: "Ending balance: $9,852.36", i2a_1: "Starting balance: $9,852.36", i2a_2: "Interest: $9,852.36 × (5%/365) × 31 = $41.84", i2a_3: "Monthly payment: $188.74", i2a_4: "Principal: $188.74 − $41.84 = $146.90", i2a_5: "Ending balance: $9,705.46", p_processAct: 'Notice how the days column varies with each month\'s actual length — yet the payment stays $188.74 every month. This is the same precision effect as 30/360: the payment is equal not because of the day-count convention, but because M is computed exactly and carried at full floating-point precision. Round interest to the penny at each step and the last payment will again adjust slightly.', layer2: "Layer 2", layer2Title: "Financial Mathematical Understanding", p_l2intro1: 'In Layer 1 we learned what amortization is and saw how it works by iterating month by month. Now the question is: <strong>how is that fixed monthly payment calculated before we start the table? Where does the number $188.71 come from?</strong>', p_l2intro2: 'The answer requires understanding a fundamental principle: the time value of money.', h_timeValue: "The Time Value of Money", p_tv1: 'A dollar today is worth more than a dollar tomorrow. Why? Because today\'s dollar can be invested and earn a return. If you deposit $100 today at a 5% annual rate, in one year you\'ll have $105. This concept works in both directions:', p_fv: '<strong>Future Value (FV):</strong> If I have $100 today, how much will I have in the future? The answer is FV = PV × (1 + r), where PV is the present value and r is the period interest rate.', p_pv: '<strong>Present Value (PV):</strong> If I\'ll receive $105 in one year, what is that worth today? The answer is PV = FV / (1 + r). In our example: PV = $105 / 1.05 = $100.', p_discount: 'The process of converting a future value to its present equivalent is called "discounting", and the rate used is called the "discount rate".', h_periodic: "The Periodic Rate", p_per1: 'As we saw in Layer 1, the APR is expressed annually but payments are monthly. We need to convert the annual rate to a monthly rate. In the 30/360 method, the conversion is straightforward:', formula_periodic: '<em>r</em> = APR / 12', p_per2: 'For our example with APR = 5%: r = 0.05 / 12 = 0.004167 (≈ 0.4167% monthly).', p_per3: 'It\'s important to note that this simple division is a <em>convention</em>, not an exact mathematical equivalence. Applying 0.4167% monthly for 12 months to a fixed balance would yield (1 + 0.004167)¹² − 1 ≈ 5.116% annually — slightly above the stated 5%. For our amortizing loan this makes no practical difference, since APR/12 is the agreed-upon periodic rate and you pay down the balance each month.', h_annuity: "Present Value of an Annuity", p_ann1: 'A loan with fixed monthly payments is, mathematically, an <strong>annuity</strong>: a series of equal payments made at regular intervals. The central question is:', lbl_keyQ: "Key question", keyQuestion: 'What fixed payment amount <strong>M</strong>, repeated for <strong>n</strong> periods at rate <strong>r</strong>, has a present value equal to the financed amount <strong>PV</strong>?', p_ann2: 'Each future payment has a different present value, since each is farther in time:', formula_series: 'PV = M/(1+r)¹ + M/(1+r)² + M/(1+r)³ + ... + M/(1+r)ⁿ', p_ann3: 'This is a geometric series. Factoring it, we get the present value of an annuity formula:', formula_annuity: 'PV = M × [<em>(1 − (1+r)⁻ⁿ) / r</em>]', h_derivM: "Deriving the Monthly Payment Formula", p_derivM1: 'Solving for M:', formula_M: 'M = PV × [<em>r × (1+r)ⁿ</em> / <em>((1+r)ⁿ − 1)</em>]', p_derivM2: 'Let\'s verify it with our example:', step_data: "Data", step_data_v: "PV = $10,000 &nbsp;|&nbsp; r = 0.05/12 = 0.0041667 &nbsp;|&nbsp; n = 60", step1: "Step 1", step1v: "(1 + r)ⁿ = (1.0041667)⁶⁰ = 1.28336", step2: "Step 2", step2v: "Numerator: r × (1+r)ⁿ = 0.0041667 × 1.28336 = 0.005347", step3: "Step 3", step3v: "Denominator: (1+r)ⁿ − 1 = 1.28336 − 1 = 0.28336", step4: "Step 4", step4v: "M = $10,000 × (0.005347 / 0.28336) = $10,000 × 0.018871 = <strong>$188.71</strong>", p_exact: '<strong>Exactly the number we used in Layer 1.</strong>', h_why30: "Why Does This Formula Only Apply to 30/360?", p_why30_1: 'The previous derivation assumes all periods are equal: every month has exactly 30 days. This allows the payment series to form a perfect geometric series with a constant common ratio.', p_why30_2: 'In actual/365 or actual/actual methods, each period has a different length (28, 29, 30, or 31 days). This means the effective rate for each period is different and the series is no longer geometric. There\'s no closed-form formula to solve for M directly.', p_why30_3: 'In these cases, we need to define a function relating M to the final balance (which must be zero) and use iterative numerical methods to find the correct value.', h_npv: "Net Present Value (NPV) as a Function of M", p_npv1: 'For an irregular loan, we define a function f(M) representing the residual balance after all payments. If M is correct, f(M) = 0. If M is too low, the balance remains positive (we owe money). If M is too high, it goes negative (we overpaid).', p_npv2: 'Since each payment M reduces the balance proportionally, f(M) is a <strong>linear</strong> function of M. This is key and can be seen in the following graph:', caption_npv: 'Residual balance f(M) vs. monthly payment M. Notice the relationship is a straight line: higher payment → lower final balance. The point where the line crosses zero is the correct payment ($188.74).', p_npv3: 'Linearity has a powerful consequence: if we draw the tangent line to f(M) at any point, that tangent <strong>is</strong> the function itself. This means Newton-Raphson will find the root in a single iteration.', h_deriv: "What Is the Derivative in This Context?", p_deriv1: 'The derivative f′(M) measures <strong>how much the final balance changes for each dollar you change in the monthly payment</strong>. Geometrically, it\'s the <em>slope</em> of the line f(M).', p_deriv2: 'If f′(M) = −53, it means that for every $1 you increase the monthly payment, the final balance decreases by $53. This makes intuitive sense: an extra dollar per month, over 60 months, reduces the balance by more than $60 because that extra dollar also reduces future interest.', caption_deriv: 'The slope of the line f(M) is constant: each additional $1 in the monthly payment reduces the final balance by approximately $53. This slope is f′(M), the derivative.', h_nr: "Newton-Raphson: Finding the Root", p_nr_intro: 'The Newton-Raphson method is an iterative algorithm for finding roots of functions (points where f(M) = 0). It works like this:', nr_s1: "Step 1", nr_s1v: "Start with an initial estimate M₀ (we use the 30/360 formula).", nr_s2: "Step 2", nr_s2v: "Evaluate f(M₀) and f′(M₀) — the function and its derivative (slope) at that point.", nr_s3: "Step 3", nr_s3v: "Draw the tangent line and jump to where it crosses zero:", formula_nr: 'M₁ = M₀ − <em>f(M₀) / f′(M₀)</em>', nr_s4: "Step 4", nr_s4v: "Repeat until |f(M)| is less than an acceptable tolerance (e.g., $0.01).", p_nr_conv: 'In general, Newton-Raphson converges quadratically: if the error is $1.00, the next iteration reduces it to ~$0.01. But since our f(M) is a straight line, the tangent is identical to the function — <strong>the first iteration already gives us the exact answer</strong>.', caption_nr: 'Newton-Raphson in action: we start from M₀ = $188.71 (30/360 formula), draw the tangent (which is the line itself), and jump directly to M₁ = $188.74 where f(M) = 0.', h_app: "Concrete Application", p_app_intro: 'Let\'s revisit our example ($10,000, 5%, 60 months, starting April 1st):', p_app1: '<strong>Initial estimate (30/360 formula):</strong> M₀ = $188.71. Simulating the 60 periods with actual days, the final balance is f(M₀) ≈ +$1.62. The balance is slightly positive, indicating we\'re paying a bit too little — there is still a small residual owed after the 60th payment.', p_app2: '<strong>Iteration 1:</strong> With f(M₀) = +$1.62 and f′(M₀) ≈ −53.27, Newton-Raphson calculates M₁ = $188.71 − (+1.62 / −53.27) = $188.71 + 0.03 = <strong>$188.74</strong>. Simulating again: f(M₁) ≈ $0.003 — practically zero. Convergence achieved.', p_app3: 'The result $188.74 is exactly the payment we used in the actual/365 table in Layer 1.', h_formalDeriv: "The Derivative f′(M): Formal Calculation", p_fd1: 'To apply Newton-Raphson we need f′(M). Since each period\'s balance depends on the previous one, we propagate the sensitivity iteratively:', formula_fd: 'dBalance<sub>i+1</sub>/dM = dBalance<sub>i</sub>/dM × (1 + APR × days<sub>i</sub>/365) − 1', p_fd2: 'We initialize with dBalance₀/dM = 0 (the financed amount doesn\'t depend on M) and propagate period by period. After 60 periods, f′(M) = dBalance₆₀/dM gives us the slope we need.', p_fd3: 'Since each iteration simply multiplies by a factor greater than 1 and subtracts 1, the result is a negative number whose magnitude grows with the number of periods. For our example, f′(M) ≈ −53.27, confirming that each additional $1 in M reduces the final balance by ~$53.', h_summary: "Summary: The Complete Map", sum1: 'The concept of the <strong>time value of money</strong> allows us to compare future payments with the amount borrowed today.', sum2: 'For regular loans (30/360), the payment series forms a <strong>geometric series</strong> that can be solved with a closed-form formula: M = PV × [r(1+r)ⁿ / ((1+r)ⁿ − 1)].', sum3: 'For irregular loans (actual/365, actual/actual), the closed-form formula doesn\'t apply. The 30/360 formula is used as an <strong>initial estimate</strong> and Newton-Raphson adjusts the result — in practice, in a single iteration because f(M) is linear.', sum4: 'The <strong>amortization table</strong> is simply the iterative application of that calculated payment, distributing each installment between interest and principal.', h_teaser: "Interactive Calculator", p_teaser: 'Put the concepts to work. Enter any loan parameters, watch Newton-Raphson converge in real time, and see exactly why real-world payments differ from the textbook formula.', teaserCta: 'Open the calculator →', ch_fM: "f(M) = Residual balance", ch_root: "Root: M = $188.74", ch_xM: "Monthly payment (M)", ch_yBal: "Residual balance f(M)", ch_pointA: "Point A", ch_pointB: "Point B", ch_slopeLabel: "Slope (derivative)", ch_tangent: "Tangent at M₀" }

    for (let i = 0; i < 60; i++) { const m = (sM + i) % 12, y = sY + Math.floor((sM + i) / 12); monthDays.push(new Date(y, m + 1, 0).getDate()); }
    function cBal(M, p, a, d) { let b = p; for (let i = 0; i < d.length; i++)b = b + b * (a / 365) * d[i] - M; return b; }
    function cDer(M, p, a, d) { let db = 0, b = p; for (let i = 0; i < d.length; i++) { const f = 1 + (a / 365) * d[i]; db = db * f - 1; b = b + b * (a / 365) * d[i] - M; } return db; }
    const PV = 10000, APR = 0.05;

    function buildCharts() {
      charts.forEach(c => c.destroy()); charts = [];
      const mobile = window.innerWidth < 600;
      const L = T[currentLang], ff = { family: 'DM Sans,system-ui', size: 13 }, tf = { family: 'JetBrains Mono,monospace', size: 11 };
      const mV = [], fV = []; for (let m = 180; m <= 198; m += .5) { mV.push(m); fV.push(cBal(m, PV, APR, monthDays)); }
      charts.push(new Chart(document.getElementById('chartNPV'), { type: 'line', data: { labels: mV.map(v => '$' + v.toFixed(0)), datasets: [{ label: L.ch_fM, data: fV.map(v => Math.round(v * 100) / 100), borderColor: '#1e6faf', backgroundColor: 'rgba(30,111,175,.08)', borderWidth: 2.5, fill: true, pointRadius: 0, tension: 0 }, { label: L.ch_root, data: mV.map(v => Math.abs(v - 189) < .3 ? 0 : null), borderColor: '#c0392b', backgroundColor: '#c0392b', pointRadius: mV.map(v => Math.abs(v - 189) < .3 ? 7 : 0), pointStyle: 'circle', showLine: false }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'DM Sans,system-ui', size: 12 } } } }, scales: { x: { title: { display: true, text: L.ch_xM, font: ff }, ticks: { maxTicksLimit: 8, font: tf }, grid: { color: '#d8d4cb' } }, y: { title: { display: !mobile, text: L.ch_yBal, font: ff }, ticks: { callback: v => '$' + v.toFixed(0), font: tf }, grid: { color: '#d8d4cb' } } } } }));
      const mA = 186, mB = 192, fA = cBal(mA, PV, APR, monthDays), fB = cBal(mB, PV, APR, monthDays), sl = (fB - fA) / (mB - mA);
      const sMs = [], sFs = []; for (let m = 183; m <= 195; m += .5) { sMs.push(m); sFs.push(cBal(m, PV, APR, monthDays)); }
      charts.push(new Chart(document.getElementById('chartDerivative'), { type: 'line', data: { labels: sMs.map(v => '$' + v.toFixed(0)), datasets: [{ label: 'f(M)', data: sFs.map(v => Math.round(v * 100) / 100), borderColor: '#1e6faf', borderWidth: 2.5, pointRadius: 0, tension: 0 }, { label: L.ch_pointA + ': M=$' + mA, data: sMs.map(v => Math.abs(v - mA) < .3 ? Math.round(fA * 100) / 100 : null), borderColor: '#27ae60', backgroundColor: '#27ae60', pointRadius: 8, showLine: false }, { label: L.ch_pointB + ': M=$' + mB, data: sMs.map(v => Math.abs(v - mB) < .3 ? Math.round(fB * 100) / 100 : null), borderColor: '#c0392b', backgroundColor: '#c0392b', pointRadius: 8, showLine: false }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'DM Sans,system-ui', size: 12 } } }, subtitle: { display: true, text: L.ch_slopeLabel + ': \u0394Balance / \u0394M = ' + (fB - fA).toFixed(1) + ' / ' + (mB - mA).toFixed(0) + ' = ' + sl.toFixed(2), font: { family: 'JetBrains Mono,monospace', size: 13 }, color: '#6b6860', padding: { bottom: 10 } } }, scales: { x: { title: { display: true, text: L.ch_xM, font: ff }, ticks: { maxTicksLimit: 8, font: tf }, grid: { color: '#d8d4cb' } }, y: { title: { display: !mobile, text: L.ch_yBal, font: ff }, ticks: { callback: v => '$' + v.toFixed(0), font: tf }, grid: { color: '#d8d4cb' } } } } }));
      const M0 = 188.71, f0 = cBal(M0, PV, APR, monthDays), fp0 = cDer(M0, PV, APR, monthDays), M1 = M0 - f0 / fp0, f1 = cBal(M1, PV, APR, monthDays);
      const nMs = [], nFs = []; for (let m = 187.5; m <= 190; m += .05) { nMs.push(m); nFs.push(cBal(m, PV, APR, monthDays)); }
      const tan = nMs.map(m => f0 + fp0 * (m - M0));
      charts.push(new Chart(document.getElementById('chartNewton'), { type: 'line', data: { labels: nMs.map(v => v.toFixed(1)), datasets: [{ label: 'f(M)', data: nFs.map(v => Math.round(v * 100) / 100), borderColor: '#1e6faf', borderWidth: 3, pointRadius: 0, tension: 0 }, { label: L.ch_tangent, data: tan.map(v => Math.round(v * 100) / 100), borderColor: '#c4956a', borderWidth: 2, borderDash: [6, 4], pointRadius: 0, tension: 0 }, { label: 'M\u2080 = $' + M0.toFixed(2) + ' \u2192 f = $' + f0.toFixed(2), data: nMs.map(v => Math.abs(v - M0) < .03 ? Math.round(f0 * 100) / 100 : null), borderColor: '#c0392b', backgroundColor: '#c0392b', pointRadius: 9, pointStyle: 'crossRot', showLine: false }, { label: 'M\u2081 = $' + M1.toFixed(2) + ' \u2192 f \u2248 $' + f1.toFixed(3), data: nMs.map(v => Math.abs(v - M1) < .03 ? 0 : null), borderColor: '#27ae60', backgroundColor: '#27ae60', pointRadius: 9, pointStyle: 'circle', showLine: false }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'DM Sans,system-ui', size: 12 } } } }, scales: { x: { title: { display: true, text: L.ch_xM, font: ff }, ticks: { maxTicksLimit: 10, font: tf }, grid: { color: '#d8d4cb' } }, y: { title: { display: !mobile, text: L.ch_yBal, font: ff }, ticks: { callback: v => '$' + v.toFixed(1), font: tf }, grid: { color: '#d8d4cb' } } } } }));
    }

    function setLang(lang) {
      currentLang = lang; document.documentElement.lang = lang; document.title = T[lang].title;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      document.getElementById('content').innerHTML = buildHTML(); buildCharts();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    setLang('en');
  </script>
