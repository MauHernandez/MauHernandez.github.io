<head>

<style>
:root{--ink:#1a1a2e;--paper:#faf9f6;--accent:#2d5f8a;--accent-light:#e8f0f7;--accent-dark:#1a3d5c;--warm:#c4956a;--warm-light:#faf0e6;--gray-100:#f5f4f1;--gray-200:#e8e6e1;--gray-400:#a8a49c;--gray-600:#6b6660;--serif:Georgia,'Times New Roman',serif;--sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'SF Mono',Menlo,Consolas,'Liberation Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--serif);background:var(--paper);color:var(--ink);font-size:18px;line-height:1.75;-webkit-font-smoothing:antialiased}
.container{max-width:780px;margin:0 auto;padding:3rem 2rem 6rem}
.lang-picker{position:fixed;top:1.25rem;right:1.25rem;z-index:100;display:flex;background:white;border-radius:10px;box-shadow:0 2px 16px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.04);overflow:hidden;font-family:var(--sans);font-size:.82rem;font-weight:600;letter-spacing:.03em}
.lang-btn{border:none;background:transparent;padding:.55rem 1rem;cursor:pointer;color:var(--gray-600);transition:all .2s;display:flex;align-items:center;gap:.4rem}
.lang-btn:first-child{border-right:1px solid var(--gray-200)}
.lang-btn:hover{background:var(--gray-100)}
.lang-btn.active{background:var(--accent);color:#fff}
.lang-btn .flag{font-size:1.1rem;line-height:1}
h1{font-family:var(--sans);font-size:2.8rem;font-weight:700;line-height:1.15;color:var(--ink);margin-bottom:.5rem;letter-spacing:-.02em}
.subtitle{font-family:var(--serif);font-style:italic;color:var(--gray-600);font-size:1.15rem;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--gray-200)}
.layer-header{font-family:var(--sans);font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:var(--accent);margin-top:4rem;margin-bottom:.25rem}
h2{font-family:var(--sans);font-size:1.85rem;font-weight:700;color:var(--ink);margin-top:3rem;margin-bottom:1rem;letter-spacing:-.01em}
h3{font-family:var(--sans);font-size:1.3rem;font-weight:600;color:var(--accent-dark);margin-top:2.5rem;margin-bottom:.75rem}
p{margin-bottom:1.25rem}strong{font-weight:600}
.callout{background:var(--gray-100);border-left:3px solid var(--gray-400);padding:1.25rem 1.5rem;margin:1.5rem 0;border-radius:0 6px 6px 0;font-size:.95rem}
.callout.example{background:var(--accent-light);border-left-color:var(--accent)}
.callout.note{background:var(--warm-light);border-left-color:var(--warm)}
.callout-label{font-family:var(--sans);font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem;display:block}
.callout.example .callout-label{color:var(--accent)}
.callout.note .callout-label{color:var(--warm)}
.formula{font-family:var(--mono);font-size:1.05rem;text-align:center;padding:1.25rem;margin:1.5rem 0;background:var(--ink);color:#e0e0e0;border-radius:8px;letter-spacing:.02em;overflow-x:auto}
.formula em{color:var(--warm);font-style:normal}
.table-wrapper{overflow-x:auto;margin:1.5rem 0;border-radius:8px;border:1px solid var(--gray-200)}
table{width:100%;border-collapse:collapse;font-size:.9rem;font-family:var(--mono)}
th{background:var(--ink);color:#fff;font-family:var(--sans);font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;padding:.75rem 1rem;text-align:right}
td{padding:.6rem 1rem;text-align:right;border-bottom:1px solid var(--gray-200)}
tr:nth-child(even) td{background:var(--gray-100)}
tr:last-child td{border-bottom:none}
.chart-container{margin:2rem 0;padding:1.5rem;background:#fff;border-radius:12px;border:1px solid var(--gray-200);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.chart-container canvas{max-height:400px}
.chart-caption{font-family:var(--sans);font-size:.82rem;color:var(--gray-600);text-align:center;margin-top:.75rem;line-height:1.5}
.step{display:flex;gap:1rem;margin-bottom:1rem;align-items:baseline}
.step-num{font-family:var(--sans);font-weight:700;color:var(--accent);font-size:.85rem;min-width:2rem;flex-shrink:0}
.assumptions{list-style:none;padding:0;margin:1rem 0}
.assumptions li{padding:.3rem 0 .3rem 1.5rem;position:relative;font-family:var(--mono);font-size:.9rem}
.assumptions li::before{content:attr(data-n);position:absolute;left:0;color:var(--accent);font-weight:600}
.summary-list{list-style:none;padding:0;counter-reset:summary}
.summary-list li{padding:1rem 0 1rem 3rem;position:relative;border-bottom:1px solid var(--gray-200);counter-increment:summary}
.summary-list li:last-child{border-bottom:none}
.summary-list li::before{content:counter(summary);position:absolute;left:0;top:1rem;width:2rem;height:2rem;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:700;font-size:.85rem}
.divider{border:none;border-top:1px solid var(--gray-200);margin:3rem 0}
.teaser{background:linear-gradient(135deg,var(--accent-light),var(--warm-light));padding:2rem;border-radius:12px;margin-top:3rem}
.teaser h3{margin-top:0;color:var(--accent-dark)}
@media(max-width:600px){.container{padding:1.5rem 1rem 4rem}h1{font-size:2rem}h2{font-size:1.5rem}.formula{font-size:.85rem;padding:1rem}table{font-size:.75rem}th,td{padding:.5rem .6rem}.lang-picker{top:.75rem;right:.75rem}}
</style>

<script>
const T={es:{title:"Préstamos y sus Partes",subtitle:"Una guía progresiva desde los conceptos básicos hasta los principios matemáticos de los pagos mensuales.",layer1:"Capa 1",layer1Title:"Entendimiento Básico",layer1Intro:'Todos conocemos lo que es el <em>monthly payment</em>: la cantidad que pagamos cada mes por un dinero prestado. Pero para entender a profundidad por qué ese número es lo que es, debemos comprender varios conceptos fundamentales.',h_financed:"Monto Financiado",p_financed:'El monto financiado es el total del dinero que usted recibe en préstamo, más cualquier cargo que se incorpore al saldo inicial. Estos cargos pueden incluir impuestos, tasas o comisiones necesarias para formalizar el préstamo. Es importante distinguir este número del precio del bien que está adquiriendo.',lbl_example:"Ejemplo",lbl_note:"Nota",example_financed:'Un vehículo tiene un precio de $17,000, pero los impuestos y tasas suman $700. El total antes de cualquier pago inicial es $17,700. Si usted da un avance de $500, su monto financiado sería: <strong>$17,700 − $500 = $17,200</strong>.',note_financed:'Las leyes de cada país o estado regulan qué cargos pueden incluirse en el monto financiado. Al tomar un préstamo, preste atención a los cargos añadidos al capital para tener claridad sobre la estructura de su obligación.',h_duration:"Duración del Préstamo",p_duration1:'Cuando hablamos de pagos "mensuales", la unidad que define formalmente la duración del préstamo es el mes, incluso cuando se expresa en años. Por ejemplo, un préstamo a 5 años equivale a 60 cuotas mensuales.',p_duration2:'Si bien la mayoría de los préstamos operan con intervalos mensuales, también es posible estructurar préstamos con intervalos anuales. Por ejemplo, un préstamo de $1,000,000 a 10 años con pagos anuales tendría 10 intervalos.',p_duration3:'El término o intervalo define <em>cuándo</em> se evalúa el préstamo para asignar una porción del pago al capital y otra a los intereses devengados. Este proceso se llama amortización, y lo veremos en detalle más adelante.',h_apr:"Interés o Tasa de Porcentaje Anual (APR)",p_apr1:'Este es posiblemente el concepto más confuso, no por casualidad sino por diseño. El interés se presenta usualmente, y en muchos casos por ley, en términos anuales. Por ejemplo, "al 6.55%".',p_apr2:'Sin embargo, el interés se <em>devenga</em> (acumula) diariamente y se <em>capitaliza</em> (cobra) en cada periodo. Esto significa que la tasa anual expresada y el costo real del interés pueden diferir. Por ejemplo, un préstamo al 6.55% anual nominal puede tener un costo efectivo cercano al 6.75%. La razón es la frecuencia de capitalización: al cobrar intereses cada mes (en vez de una sola vez al año), los intereses del primer mes generan sus propios intereses en los meses siguientes.',p_apr3:'Entender esta diferencia entre tasa nominal y tasa efectiva es fundamental para comparar préstamos y para aplicar técnicas de optimización de pago. Lo formalizaremos matemáticamente en la Capa 2.',h_amort:"Amortización",p_amort:'La amortización de un préstamo es el proceso mediante el cual, en cada periodo, se determina qué porción de tu pago reduce el capital (principal) y qué porción corresponde a los intereses acumulados. De un pago mensual fijo, la proporción destinada a intereses <strong>disminuye</strong> con el tiempo mientras que la proporción destinada al principal <strong>aumenta</strong>.',h_methods:"Métodos de Amortización",p_methods_intro:'El método de amortización determina cómo se calcula el interés de cada periodo. Los más comunes son:',p_30360:'<strong>30/360 (préstamo regular o anualidad):</strong> Simplifica la matemática asumiendo que todos los meses tienen 30 días y el año tiene 360 días. Esto produce un pago mensual idéntico en cada periodo.',p_actual365:'<strong>Actual/365 (préstamo irregular):</strong> Utiliza el número real de días de cada mes, pero asume que todos los años tienen 365 días (ignora años bisiestos).',p_actualactual:'<strong>Actual/Actual (ISDA):</strong> Utiliza el número real de días de cada mes y el número real de días del año (365 o 366 según corresponda). Es el método más preciso pero también el más complejo.',note_irregular:'Los préstamos irregulares (actual/365 y actual/actual) no tienen una fórmula cerrada simple para el pago mensual. La fórmula estándar del método 30/360 se usa frecuentemente como estimación inicial, y luego se ajusta mediante métodos numéricos como Newton-Raphson (ver Capa 2).',h_practical:"Ejemplo Práctico",p_practical:'Para comparar ambos métodos, usaremos las mismas condiciones iniciales:',ass1:"Préstamo: $10,000",ass2:"APR: 5%",ass3:"Plazo: 5 años (60 meses)",ass4:"Inicio del préstamo: 1 de abril",ass5:"Primer pago: 30 de abril",h_ex30360:"Ejemplo con 30/360",p_ex30360_intro:'Con este método, el interés de cada periodo se calcula como:',formula_30360:'<em>Interés</em> = Balance × (APR / 360) × 30',p_iter1_30:'<strong>Iteración 1:</strong> Balance inicial: $10,000. Interés: $10,000 × (5%/360) × 30 = $41.67. Pago mensual: $188.71. Principal: $188.71 − $41.67 = $147.04. Balance final: $9,852.96.',p_iter2_30:'<strong>Iteración 2:</strong> Balance inicial: $9,852.96. Interés: $9,852.96 × (5%/360) × 30 = $41.05. Principal: $188.71 − $41.05 = $147.66. Balance final: $9,705.30.',p_process30:'Este proceso se repite durante 60 periodos hasta que el balance llega a $0.00:',th_num:"#",th_days:"Días",th_payment:"Pago",th_interest:"Interés",th_principal:"Principal",th_balance:"Balance",h_exActual:"Ejemplo con Actual/365",p_exActual_intro:'Con este método, el interés usa los días reales de cada mes:',formula_actual:'<em>Interés</em> = Balance × (APR / 365) × días reales del periodo',p_iter1_act:'<strong>Iteración 1 (abril, 30 días):</strong> Balance inicial: $10,000. Interés: $10,000 × (5%/365) × 30 = $41.10. Pago: $188.74. Principal: $147.64. Balance: $9,852.36.',p_iter2_act:'<strong>Iteración 2 (mayo, 31 días):</strong> Balance: $9,852.36. Interés: $9,852.36 × (5%/365) × 31 = $41.84. Pago: $188.74. Principal: $146.90. Balance: $9,705.46.',p_processAct:'Observe cómo la columna de días varía y el último pago se ajusta ligeramente ($188.72 en vez de $188.74) para cerrar el balance en exactamente $0.00:',p_rounding:'Esta diferencia en el último pago se debe al redondeo acumulado de centavos a lo largo de los 60 periodos. En préstamos reales, la entidad financiera ajusta el último pago para que el balance cierre exactamente en cero.',layer2:"Capa 2",layer2Title:"Entendimiento Matemático Financiero",p_l2intro1:'En la Capa 1 aprendimos qué es la amortización y vimos cómo funciona iterando mes a mes. Ahora la pregunta es: <strong>¿cómo se calcula ese pago mensual fijo antes de empezar la tabla? ¿De dónde sale el número $188.71?</strong>',p_l2intro2:'La respuesta requiere entender un principio fundamental: el valor del dinero en el tiempo.',h_timeValue:"El Valor del Dinero en el Tiempo",p_tv1:'Un dólar hoy vale más que un dólar mañana. ¿Por qué? Porque el dólar de hoy puede ser invertido y generar rendimiento. Si depositas $100 hoy a una tasa del 5% anual, dentro de un año tendrás $105. Este concepto funciona en ambas direcciones:',p_fv:'<strong>Valor Futuro (FV):</strong> Si tengo $100 hoy, ¿cuánto tendré en el futuro? La respuesta es FV = PV × (1 + r), donde PV es el valor presente y r es la tasa de interés del periodo.',p_pv:'<strong>Valor Presente (PV):</strong> Si recibiré $105 en un año, ¿cuánto vale eso hoy? La respuesta es PV = FV / (1 + r). En nuestro ejemplo: PV = $105 / 1.05 = $100.',p_discount:'El proceso de convertir un valor futuro a su equivalente presente se llama "descontar", y la tasa utilizada se llama "tasa de descuento".',h_periodic:"La Tasa Periódica",p_per1:'Como vimos en la Capa 1, el APR se expresa anualmente pero los pagos son mensuales. Necesitamos convertir la tasa anual a una tasa mensual. En el método 30/360, la conversión es directa:',formula_periodic:'<em>r</em> = APR / 12',p_per2:'Para nuestro ejemplo con APR = 5%: r = 0.05 / 12 = 0.004167 (≈ 0.4167% mensual).',p_per3:'Es importante notar que esta división simple es una <em>convención</em>, no una equivalencia matemática exacta. Si capitalizáramos 0.4167% mensual durante 12 meses, el resultado efectivo anual sería (1 + 0.004167)¹² − 1 ≈ 5.116%, ligeramente mayor al 5% nominal. Esta es la diferencia entre tasa nominal y tasa efectiva que mencionamos en la Capa 1.',h_annuity:"Valor Presente de una Anualidad",p_ann1:'Un préstamo con pagos mensuales fijos es, matemáticamente, una <strong>anualidad</strong>: una serie de pagos iguales realizados a intervalos regulares. La pregunta central es:',lbl_keyQ:"Pregunta clave",keyQuestion:'¿Qué monto de pago fijo <strong>M</strong>, repetido durante <strong>n</strong> periodos a una tasa <strong>r</strong>, tiene un valor presente igual al monto financiado <strong>PV</strong>?',p_ann2:'Cada uno de los pagos futuros tiene un valor presente diferente, ya que cada uno está más lejos en el tiempo:',formula_series:'PV = M/(1+r)¹ + M/(1+r)² + M/(1+r)³ + ... + M/(1+r)ⁿ',p_ann3:'Esta es una serie geométrica. Factorizándola, obtenemos la fórmula del valor presente de una anualidad:',formula_annuity:'PV = M × [<em>(1 − (1+r)⁻ⁿ) / r</em>]',h_derivM:"Derivación de la Fórmula del Pago Mensual",p_derivM1:'Despejando M:',formula_M:'M = PV × [<em>r × (1+r)ⁿ</em> / <em>((1+r)ⁿ − 1)</em>]',p_derivM2:'Verifiquémosla con nuestro ejemplo:',step_data:"Datos",step_data_v:"PV = $10,000 &nbsp;|&nbsp; r = 0.05/12 = 0.0041667 &nbsp;|&nbsp; n = 60",step1:"Paso 1",step1v:"(1 + r)ⁿ = (1.0041667)⁶⁰ = 1.28336",step2:"Paso 2",step2v:"Numerador: r × (1+r)ⁿ = 0.0041667 × 1.28336 = 0.005347",step3:"Paso 3",step3v:"Denominador: (1+r)ⁿ − 1 = 1.28336 − 1 = 0.28336",step4:"Paso 4",step4v:"M = $10,000 × (0.005347 / 0.28336) = $10,000 × 0.018871 = <strong>$188.71</strong>",p_exact:'<strong>Exactamente el número que usamos en la Capa 1.</strong>',h_why30:"¿Por Qué Esta Fórmula Solo Aplica al Método 30/360?",p_why30_1:'La derivación anterior asume que todos los periodos son iguales: cada mes tiene exactamente 30 días. Esto permite que la serie de pagos forme una serie geométrica perfecta con una razón común constante.',p_why30_2:'En los métodos actual/365 o actual/actual, cada periodo tiene una duración diferente (28, 29, 30 o 31 días). Esto significa que la tasa efectiva de cada periodo es distinta y la serie ya no es geométrica. No existe una fórmula cerrada para despejar M directamente.',p_why30_3:'En estos casos, necesitamos definir una función que relacione M con el balance final (que debe ser cero) y usar métodos numéricos iterativos para encontrar el valor correcto.',h_npv:"Valor Presente Neto (NPV) como función de M",p_npv1:'Para un préstamo irregular, definimos una función f(M) que representa el balance residual después de todos los pagos. Si M es correcto, f(M) = 0. Si M es demasiado bajo, el balance queda positivo (debemos dinero). Si M es demasiado alto, queda negativo (pagamos de más).',p_npv2:'Dado que cada pago M reduce el balance de forma proporcional, f(M) es una función <strong>lineal</strong> de M. Esto es clave y se puede ver en la siguiente gráfica:',caption_npv:'Balance residual f(M) vs. pago mensual M. Observe que la relación es una recta: mayor pago → menor balance final. El punto donde la recta cruza cero es el pago correcto ($188.74).',p_npv3:'La linealidad tiene una consecuencia poderosa: si trazamos la recta tangente a f(M) en cualquier punto, esa tangente <strong>es</strong> la función misma. Esto significa que Newton-Raphson encontrará la raíz en una sola iteración.',h_deriv:"¿Qué es la derivada en este contexto?",p_deriv1:'La derivada f′(M) mide <strong>cuánto cambia el balance final por cada dólar que cambias en el pago mensual</strong>. Geométricamente, es la <em>pendiente</em> de la recta f(M).',p_deriv2:'Si f′(M) = −53, significa que por cada $1 que aumentes el pago mensual, el balance final disminuye en $53. Esto tiene sentido intuitivo: un dólar extra por mes, durante 60 meses, reduce el balance más de $60 porque ese dólar extra también reduce los intereses futuros.',caption_deriv:'La pendiente de la recta f(M) es constante: cada $1 adicional en el pago mensual reduce el balance final en aproximadamente $53. Esta pendiente es f′(M), la derivada.',h_nr:"Newton-Raphson: Encontrar la Raíz",p_nr_intro:'El método de Newton-Raphson es un algoritmo iterativo para encontrar raíces de funciones (puntos donde f(M) = 0). Funciona así:',nr_s1:"Paso 1",nr_s1v:"Comenzar con una estimación inicial M₀ (usamos la fórmula 30/360).",nr_s2:"Paso 2",nr_s2v:"Evaluar f(M₀) y f′(M₀) — la función y su derivada (pendiente) en ese punto.",nr_s3:"Paso 3",nr_s3v:"Trazar la recta tangente y saltar a donde cruza cero:",formula_nr:'M₁ = M₀ − <em>f(M₀) / f′(M₀)</em>',nr_s4:"Paso 4",nr_s4v:"Repetir hasta que |f(M)| sea menor que una tolerancia (por ejemplo, $0.01).",p_nr_conv:'En general, Newton-Raphson converge cuadráticamente: si el error es $1.00, la siguiente iteración lo reduce a ~$0.01. Pero como nuestro f(M) es una recta, la tangente es idéntica a la función — <strong>la primera iteración ya nos da la respuesta exacta</strong>.',caption_nr:'Newton-Raphson en acción: partimos de M₀ = $188.71 (fórmula 30/360), trazamos la tangente (que es la recta misma), y saltamos directamente a M₁ = $188.74 donde f(M) = 0.',h_app:"Aplicación Concreta",p_app_intro:'Retomemos nuestro ejemplo ($10,000, 5%, 60 meses, inicio 1 de abril):',p_app1:'<strong>Estimación inicial (fórmula 30/360):</strong> M₀ = $188.71. Al simular los 60 periodos con días reales, el balance final resulta f(M₀) ≈ −$1.62. El balance es ligeramente negativo, lo que indica que estamos pagando un poco de más.',p_app2:'<strong>Iteración 1:</strong> Con f(M₀) = −$1.62 y f′(M₀) ≈ −53.27, Newton-Raphson calcula M₁ = $188.71 − (−1.62 / −53.27) = $188.71 + 0.03 = <strong>$188.74</strong>. Al simular nuevamente: f(M₁) ≈ $0.003 — prácticamente cero. Convergencia alcanzada.',p_app3:'El resultado $188.74 es exactamente el pago que usamos en la tabla actual/365 de la Capa 1.',h_formalDeriv:"La Derivada f′(M): Cálculo Formal",p_fd1:'Para aplicar Newton-Raphson necesitamos f′(M). Dado que el balance de cada periodo depende del anterior, propagamos la sensibilidad iterativamente:',formula_fd:'dBalance<sub>i+1</sub>/dM = dBalance<sub>i</sub>/dM × (1 + APR × días<sub>i</sub>/365) − 1',p_fd2:'Se inicializa con dBalance₀/dM = 0 (el monto financiado no depende de M) y se propaga periodo a periodo. Al final de los 60 periodos, f′(M) = dBalance₆₀/dM nos da la pendiente que necesitamos.',p_fd3:'Dado que cada iteración simplemente multiplica por un factor mayor a 1 y resta 1, el resultado es un número negativo cuya magnitud crece con el número de periodos. Para nuestro ejemplo, f′(M) ≈ −53.27, confirmando que cada $1 adicional en M reduce el balance final en ~$53.',h_summary:"Resumen: El Mapa Completo",sum1:'El concepto de <strong>valor del dinero en el tiempo</strong> nos permite comparar pagos futuros con el monto prestado hoy.',sum2:'Para préstamos regulares (30/360), la serie de pagos forma una <strong>serie geométrica</strong> que se resuelve con una fórmula cerrada: M = PV × [r(1+r)ⁿ / ((1+r)ⁿ − 1)].',sum3:'Para préstamos irregulares (actual/365, actual/actual), la fórmula cerrada no aplica. Se usa la fórmula 30/360 como <strong>estimación inicial</strong> y Newton-Raphson ajusta el resultado — en la práctica, en una sola iteración porque f(M) es lineal.',sum4:'La <strong>tabla de amortización</strong> es simplemente la aplicación iterativa de ese pago calculado, distribuyendo cada cuota entre intereses y capital.',h_teaser:"Próximamente: Capa 3",p_teaser:'Exploraremos técnicas de optimización: pagos adicionales al principal, refinanciamiento, y cómo pequeños cambios en la estrategia de pago pueden ahorrar miles de dólares en intereses a lo largo de la vida del préstamo.',ch_fM:"f(M) = Balance residual",ch_root:"Raíz: M = $188.74",ch_xM:"Pago mensual (M)",ch_yBal:"Balance residual f(M)",ch_pointA:"Punto A",ch_pointB:"Punto B",ch_slopeLabel:"Pendiente (derivada)",ch_tangent:"Tangente en M₀"},
en:{title:"Loans and Their Components",subtitle:"A progressive guide from basic concepts to the mathematical principles behind monthly payments.",layer1:"Layer 1",layer1Title:"Basic Understanding",layer1Intro:'We all know what a <em>monthly payment</em> is: the amount we pay each month for borrowed money. But to truly understand why that number is what it is, we need to grasp several fundamental concepts.',h_financed:"Financed Amount",p_financed:"The financed amount is the total money you receive as a loan, plus any charges incorporated into the initial balance. These charges may include taxes, fees, or commissions required to formalize the loan. It's important to distinguish this number from the price of the asset you're acquiring.",lbl_example:"Example",lbl_note:"Note",example_financed:'A vehicle is priced at $17,000, but taxes and fees add $700. The total before any down payment is $17,700. If you put $500 down, your financed amount would be: <strong>$17,700 − $500 = $17,200</strong>.',note_financed:'Laws in each country or state regulate which charges can be included in the financed amount. When taking out a loan, pay attention to charges added to the principal for clarity on the structure of your obligation.',h_duration:"Loan Duration",p_duration1:'When we talk about "monthly" payments, the unit that formally defines the loan\'s duration is the month, even when expressed in years. For example, a 5-year loan equals 60 monthly installments.',p_duration2:'While most loans operate with monthly intervals, it\'s also possible to structure loans with annual intervals. For example, a $1,000,000 loan over 10 years with annual payments would have 10 intervals.',p_duration3:'The term or interval defines <em>when</em> the loan is evaluated to allocate a portion of the payment to principal and another to accrued interest. This process is called amortization, and we\'ll cover it in detail below.',h_apr:"Interest or Annual Percentage Rate (APR)",p_apr1:'This is possibly the most confusing concept, not by accident but by design. Interest is usually presented, and in many cases required by law, in annual terms. For example, "at 6.55%".',p_apr2:'However, interest <em>accrues</em> (accumulates) daily and is <em>capitalized</em> (charged) each period. This means the stated annual rate and the actual cost of interest can differ. For example, a loan at 6.55% nominal annual rate may have an effective cost closer to 6.75%. The reason is compounding frequency: by charging interest monthly (instead of once a year), the first month\'s interest generates its own interest in subsequent months.',p_apr3:'Understanding this difference between nominal and effective rates is fundamental for comparing loans and applying payment optimization techniques. We\'ll formalize this mathematically in Layer 2.',h_amort:"Amortization",p_amort:'Loan amortization is the process by which, in each period, we determine what portion of your payment reduces the principal and what portion corresponds to accumulated interest. From a fixed monthly payment, the portion going to interest <strong>decreases</strong> over time while the portion going to principal <strong>increases</strong>.',h_methods:"Amortization Methods",p_methods_intro:'The amortization method determines how interest is calculated for each period. The most common are:',p_30360:'<strong>30/360 (regular loan or annuity):</strong> Simplifies the math by assuming all months have 30 days and the year has 360 days. This produces an identical monthly payment each period.',p_actual365:'<strong>Actual/365 (irregular loan):</strong> Uses the actual number of days in each month, but assumes all years have 365 days (ignores leap years).',p_actualactual:'<strong>Actual/Actual (ISDA):</strong> Uses the actual number of days in each month and the actual number of days in the year (365 or 366 as applicable). The most precise but also most complex method.',note_irregular:'Irregular loans (actual/365 and actual/actual) don\'t have a simple closed-form formula for the monthly payment. The standard 30/360 formula is frequently used as an initial estimate, then adjusted using numerical methods like Newton-Raphson (see Layer 2).',h_practical:"Practical Example",p_practical:'To compare both methods, we\'ll use the same initial conditions:',ass1:"Loan: $10,000",ass2:"APR: 5%",ass3:"Term: 5 years (60 months)",ass4:"Loan start: April 1st",ass5:"First payment: April 30th",h_ex30360:"Example with 30/360",p_ex30360_intro:'With this method, the interest for each period is calculated as:',formula_30360:'<em>Interest</em> = Balance × (APR / 360) × 30',p_iter1_30:'<strong>Iteration 1:</strong> Starting balance: $10,000. Interest: $10,000 × (5%/360) × 30 = $41.67. Monthly payment: $188.71. Principal: $188.71 − $41.67 = $147.04. Ending balance: $9,852.96.',p_iter2_30:'<strong>Iteration 2:</strong> Starting balance: $9,852.96. Interest: $9,852.96 × (5%/360) × 30 = $41.05. Principal: $188.71 − $41.05 = $147.66. Ending balance: $9,705.30.',p_process30:'This process repeats for 60 periods until the balance reaches $0.00:',th_num:"#",th_days:"Days",th_payment:"Payment",th_interest:"Interest",th_principal:"Principal",th_balance:"Balance",h_exActual:"Example with Actual/365",p_exActual_intro:'With this method, interest uses the actual days in each month:',formula_actual:'<em>Interest</em> = Balance × (APR / 365) × actual days in period',p_iter1_act:'<strong>Iteration 1 (April, 30 days):</strong> Starting balance: $10,000. Interest: $10,000 × (5%/365) × 30 = $41.10. Payment: $188.74. Principal: $147.64. Balance: $9,852.36.',p_iter2_act:'<strong>Iteration 2 (May, 31 days):</strong> Balance: $9,852.36. Interest: $9,852.36 × (5%/365) × 31 = $41.84. Payment: $188.74. Principal: $146.90. Balance: $9,705.46.',p_processAct:'Notice how the days column varies and the last payment adjusts slightly ($188.72 instead of $188.74) to close the balance at exactly $0.00:',p_rounding:'This difference in the last payment is due to cumulative penny rounding over the 60 periods. In real loans, the financial institution adjusts the last payment so the balance closes at exactly zero.',layer2:"Layer 2",layer2Title:"Financial Mathematical Understanding",p_l2intro1:'In Layer 1 we learned what amortization is and saw how it works by iterating month by month. Now the question is: <strong>how is that fixed monthly payment calculated before we start the table? Where does the number $188.71 come from?</strong>',p_l2intro2:'The answer requires understanding a fundamental principle: the time value of money.',h_timeValue:"The Time Value of Money",p_tv1:'A dollar today is worth more than a dollar tomorrow. Why? Because today\'s dollar can be invested and earn a return. If you deposit $100 today at a 5% annual rate, in one year you\'ll have $105. This concept works in both directions:',p_fv:'<strong>Future Value (FV):</strong> If I have $100 today, how much will I have in the future? The answer is FV = PV × (1 + r), where PV is the present value and r is the period interest rate.',p_pv:'<strong>Present Value (PV):</strong> If I\'ll receive $105 in one year, what is that worth today? The answer is PV = FV / (1 + r). In our example: PV = $105 / 1.05 = $100.',p_discount:'The process of converting a future value to its present equivalent is called "discounting", and the rate used is called the "discount rate".',h_periodic:"The Periodic Rate",p_per1:'As we saw in Layer 1, the APR is expressed annually but payments are monthly. We need to convert the annual rate to a monthly rate. In the 30/360 method, the conversion is straightforward:',formula_periodic:'<em>r</em> = APR / 12',p_per2:'For our example with APR = 5%: r = 0.05 / 12 = 0.004167 (≈ 0.4167% monthly).',p_per3:'It\'s important to note that this simple division is a <em>convention</em>, not an exact mathematical equivalence. If we compounded 0.4167% monthly for 12 months, the effective annual result would be (1 + 0.004167)¹² − 1 ≈ 5.116%, slightly higher than the 5% nominal rate. This is the difference between nominal and effective rates we mentioned in Layer 1.',h_annuity:"Present Value of an Annuity",p_ann1:'A loan with fixed monthly payments is, mathematically, an <strong>annuity</strong>: a series of equal payments made at regular intervals. The central question is:',lbl_keyQ:"Key question",keyQuestion:'What fixed payment amount <strong>M</strong>, repeated for <strong>n</strong> periods at rate <strong>r</strong>, has a present value equal to the financed amount <strong>PV</strong>?',p_ann2:'Each future payment has a different present value, since each is farther in time:',formula_series:'PV = M/(1+r)¹ + M/(1+r)² + M/(1+r)³ + ... + M/(1+r)ⁿ',p_ann3:'This is a geometric series. Factoring it, we get the present value of an annuity formula:',formula_annuity:'PV = M × [<em>(1 − (1+r)⁻ⁿ) / r</em>]',h_derivM:"Deriving the Monthly Payment Formula",p_derivM1:'Solving for M:',formula_M:'M = PV × [<em>r × (1+r)ⁿ</em> / <em>((1+r)ⁿ − 1)</em>]',p_derivM2:'Let\'s verify it with our example:',step_data:"Data",step_data_v:"PV = $10,000 &nbsp;|&nbsp; r = 0.05/12 = 0.0041667 &nbsp;|&nbsp; n = 60",step1:"Step 1",step1v:"(1 + r)ⁿ = (1.0041667)⁶⁰ = 1.28336",step2:"Step 2",step2v:"Numerator: r × (1+r)ⁿ = 0.0041667 × 1.28336 = 0.005347",step3:"Step 3",step3v:"Denominator: (1+r)ⁿ − 1 = 1.28336 − 1 = 0.28336",step4:"Step 4",step4v:"M = $10,000 × (0.005347 / 0.28336) = $10,000 × 0.018871 = <strong>$188.71</strong>",p_exact:'<strong>Exactly the number we used in Layer 1.</strong>',h_why30:"Why Does This Formula Only Apply to 30/360?",p_why30_1:'The previous derivation assumes all periods are equal: every month has exactly 30 days. This allows the payment series to form a perfect geometric series with a constant common ratio.',p_why30_2:'In actual/365 or actual/actual methods, each period has a different length (28, 29, 30, or 31 days). This means the effective rate for each period is different and the series is no longer geometric. There\'s no closed-form formula to solve for M directly.',p_why30_3:'In these cases, we need to define a function relating M to the final balance (which must be zero) and use iterative numerical methods to find the correct value.',h_npv:"Net Present Value (NPV) as a Function of M",p_npv1:'For an irregular loan, we define a function f(M) representing the residual balance after all payments. If M is correct, f(M) = 0. If M is too low, the balance remains positive (we owe money). If M is too high, it goes negative (we overpaid).',p_npv2:'Since each payment M reduces the balance proportionally, f(M) is a <strong>linear</strong> function of M. This is key and can be seen in the following graph:',caption_npv:'Residual balance f(M) vs. monthly payment M. Notice the relationship is a straight line: higher payment → lower final balance. The point where the line crosses zero is the correct payment ($188.74).',p_npv3:'Linearity has a powerful consequence: if we draw the tangent line to f(M) at any point, that tangent <strong>is</strong> the function itself. This means Newton-Raphson will find the root in a single iteration.',h_deriv:"What Is the Derivative in This Context?",p_deriv1:'The derivative f′(M) measures <strong>how much the final balance changes for each dollar you change in the monthly payment</strong>. Geometrically, it\'s the <em>slope</em> of the line f(M).',p_deriv2:'If f′(M) = −53, it means that for every $1 you increase the monthly payment, the final balance decreases by $53. This makes intuitive sense: an extra dollar per month, over 60 months, reduces the balance by more than $60 because that extra dollar also reduces future interest.',caption_deriv:'The slope of the line f(M) is constant: each additional $1 in the monthly payment reduces the final balance by approximately $53. This slope is f′(M), the derivative.',h_nr:"Newton-Raphson: Finding the Root",p_nr_intro:'The Newton-Raphson method is an iterative algorithm for finding roots of functions (points where f(M) = 0). It works like this:',nr_s1:"Step 1",nr_s1v:"Start with an initial estimate M₀ (we use the 30/360 formula).",nr_s2:"Step 2",nr_s2v:"Evaluate f(M₀) and f′(M₀) — the function and its derivative (slope) at that point.",nr_s3:"Step 3",nr_s3v:"Draw the tangent line and jump to where it crosses zero:",formula_nr:'M₁ = M₀ − <em>f(M₀) / f′(M₀)</em>',nr_s4:"Step 4",nr_s4v:"Repeat until |f(M)| is less than an acceptable tolerance (e.g., $0.01).",p_nr_conv:'In general, Newton-Raphson converges quadratically: if the error is $1.00, the next iteration reduces it to ~$0.01. But since our f(M) is a straight line, the tangent is identical to the function — <strong>the first iteration already gives us the exact answer</strong>.',caption_nr:'Newton-Raphson in action: we start from M₀ = $188.71 (30/360 formula), draw the tangent (which is the line itself), and jump directly to M₁ = $188.74 where f(M) = 0.',h_app:"Concrete Application",p_app_intro:'Let\'s revisit our example ($10,000, 5%, 60 months, starting April 1st):',p_app1:'<strong>Initial estimate (30/360 formula):</strong> M₀ = $188.71. Simulating the 60 periods with actual days, the final balance is f(M₀) ≈ −$1.62. The balance is slightly negative, indicating we\'re paying a bit too much.',p_app2:'<strong>Iteration 1:</strong> With f(M₀) = −$1.62 and f′(M₀) ≈ −53.27, Newton-Raphson calculates M₁ = $188.71 − (−1.62 / −53.27) = $188.71 + 0.03 = <strong>$188.74</strong>. Simulating again: f(M₁) ≈ $0.003 — practically zero. Convergence achieved.',p_app3:'The result $188.74 is exactly the payment we used in the actual/365 table in Layer 1.',h_formalDeriv:"The Derivative f′(M): Formal Calculation",p_fd1:'To apply Newton-Raphson we need f′(M). Since each period\'s balance depends on the previous one, we propagate the sensitivity iteratively:',formula_fd:'dBalance<sub>i+1</sub>/dM = dBalance<sub>i</sub>/dM × (1 + APR × days<sub>i</sub>/365) − 1',p_fd2:'We initialize with dBalance₀/dM = 0 (the financed amount doesn\'t depend on M) and propagate period by period. After 60 periods, f′(M) = dBalance₆₀/dM gives us the slope we need.',p_fd3:'Since each iteration simply multiplies by a factor greater than 1 and subtracts 1, the result is a negative number whose magnitude grows with the number of periods. For our example, f′(M) ≈ −53.27, confirming that each additional $1 in M reduces the final balance by ~$53.',h_summary:"Summary: The Complete Map",sum1:'The concept of the <strong>time value of money</strong> allows us to compare future payments with the amount borrowed today.',sum2:'For regular loans (30/360), the payment series forms a <strong>geometric series</strong> that can be solved with a closed-form formula: M = PV × [r(1+r)ⁿ / ((1+r)ⁿ − 1)].',sum3:'For irregular loans (actual/365, actual/actual), the closed-form formula doesn\'t apply. The 30/360 formula is used as an <strong>initial estimate</strong> and Newton-Raphson adjusts the result — in practice, in a single iteration because f(M) is linear.',sum4:'The <strong>amortization table</strong> is simply the iterative application of that calculated payment, distributing each installment between interest and principal.',h_teaser:"Coming Soon: Layer 3",p_teaser:'We\'ll explore optimization techniques: extra principal payments, refinancing, and how small changes in payment strategy can save thousands of dollars in interest over the life of the loan.',ch_fM:"f(M) = Residual balance",ch_root:"Root: M = $188.74",ch_xM:"Monthly payment (M)",ch_yBal:"Residual balance f(M)",ch_pointA:"Point A",ch_pointB:"Point B",ch_slopeLabel:"Slope (derivative)",ch_tangent:"Tangent at M₀"}};

<hr class="divider"><h2>${L.h_summary}</h2>
<ol class="summary-list"><li>${L.sum1}</li><li>${L.sum2}</li><li>${L.sum3}</li><li>${L.sum4}</li></ol>
<div class="teaser"><h3>${L.h_teaser}</h3><p>${L.p_teaser}</p></div>`;}

const monthDays=[];const sY=2025,sM=3;
for(let i=0;i<60;i++){const m=(sM+i)%12,y=sY+Math.floor((sM+i)/12);monthDays.push(new Date(y,m+1,0).getDate());}
function cBal(M,p,a,d){let b=p;for(let i=0;i<d.length;i++)b=b+b*(a/365)*d[i]-M;return b;}
function cDer(M,p,a,d){let db=0,b=p;for(let i=0;i<d.length;i++){const f=1+(a/365)*d[i];db=db*f-1;b=b+b*(a/365)*d[i]-M;}return db;}
const PV=10000,APR=0.05;

function buildCharts(){
charts.forEach(c=>c.destroy());charts=[];
const L=T[currentLang],ff={family:'system-ui',size:13},tf={family:'SF Mono,Menlo,monospace',size:11};
const mV=[],fV=[];for(let m=180;m<=198;m+=.5){mV.push(m);fV.push(cBal(m,PV,APR,monthDays));}
charts.push(new Chart(document.getElementById('chartNPV'),{type:'line',data:{labels:mV.map(v=>'$'+v.toFixed(0)),datasets:[{label:L.ch_fM,data:fV.map(v=>Math.round(v*100)/100),borderColor:'#2d5f8a',backgroundColor:'rgba(45,95,138,.08)',borderWidth:2.5,fill:true,pointRadius:0,tension:0},{label:L.ch_root,data:mV.map(v=>Math.abs(v-189)<.3?0:null),borderColor:'#c0392b',backgroundColor:'#c0392b',pointRadius:mV.map(v=>Math.abs(v-189)<.3?7:0),pointStyle:'circle',showLine:false}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'system-ui',size:12}}}},scales:{x:{title:{display:true,text:L.ch_xM,font:ff},ticks:{maxTicksLimit:8,font:tf},grid:{color:'#e8e6e1'}},y:{title:{display:true,text:L.ch_yBal,font:ff},ticks:{callback:v=>'$'+v.toFixed(0),font:tf},grid:{color:'#e8e6e1'}}}}}));
const mA=186,mB=192,fA=cBal(mA,PV,APR,monthDays),fB=cBal(mB,PV,APR,monthDays),sl=(fB-fA)/(mB-mA);
const sMs=[],sFs=[];for(let m=183;m<=195;m+=.5){sMs.push(m);sFs.push(cBal(m,PV,APR,monthDays));}
charts.push(new Chart(document.getElementById('chartDerivative'),{type:'line',data:{labels:sMs.map(v=>'$'+v.toFixed(0)),datasets:[{label:'f(M)',data:sFs.map(v=>Math.round(v*100)/100),borderColor:'#2d5f8a',borderWidth:2.5,pointRadius:0,tension:0},{label:L.ch_pointA+': M=$'+mA,data:sMs.map(v=>Math.abs(v-mA)<.3?Math.round(fA*100)/100:null),borderColor:'#27ae60',backgroundColor:'#27ae60',pointRadius:8,showLine:false},{label:L.ch_pointB+': M=$'+mB,data:sMs.map(v=>Math.abs(v-mB)<.3?Math.round(fB*100)/100:null),borderColor:'#c0392b',backgroundColor:'#c0392b',pointRadius:8,showLine:false}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'system-ui',size:12}}},subtitle:{display:true,text:L.ch_slopeLabel+': \u0394Balance / \u0394M = '+(fB-fA).toFixed(1)+' / '+(mB-mA).toFixed(0)+' = '+sl.toFixed(2),font:{family:'SF Mono,Menlo,monospace',size:13},color:'#6b6660',padding:{bottom:10}}},scales:{x:{title:{display:true,text:L.ch_xM,font:ff},ticks:{maxTicksLimit:8,font:tf},grid:{color:'#e8e6e1'}},y:{title:{display:true,text:L.ch_yBal,font:ff},ticks:{callback:v=>'$'+v.toFixed(0),font:tf},grid:{color:'#e8e6e1'}}}}}));
const M0=188.71,f0=cBal(M0,PV,APR,monthDays),fp0=cDer(M0,PV,APR,monthDays),M1=M0-f0/fp0,f1=cBal(M1,PV,APR,monthDays);
const nMs=[],nFs=[];for(let m=187.5;m<=190;m+=.05){nMs.push(m);nFs.push(cBal(m,PV,APR,monthDays));}
const tan=nMs.map(m=>f0+fp0*(m-M0));
charts.push(new Chart(document.getElementById('chartNewton'),{type:'line',data:{labels:nMs.map(v=>v.toFixed(1)),datasets:[{label:'f(M)',data:nFs.map(v=>Math.round(v*100)/100),borderColor:'#2d5f8a',borderWidth:3,pointRadius:0,tension:0},{label:L.ch_tangent,data:tan.map(v=>Math.round(v*100)/100),borderColor:'#c4956a',borderWidth:2,borderDash:[6,4],pointRadius:0,tension:0},{label:'M\u2080 = $'+M0.toFixed(2)+' \u2192 f = $'+f0.toFixed(2),data:nMs.map(v=>Math.abs(v-M0)<.03?Math.round(f0*100)/100:null),borderColor:'#c0392b',backgroundColor:'#c0392b',pointRadius:9,pointStyle:'crossRot',showLine:false},{label:'M\u2081 = $'+M1.toFixed(2)+' \u2192 f \u2248 $'+f1.toFixed(3),data:nMs.map(v=>Math.abs(v-M1)<.03?0:null),borderColor:'#27ae60',backgroundColor:'#27ae60',pointRadius:9,pointStyle:'circle',showLine:false}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'system-ui',size:12}}}},scales:{x:{title:{display:true,text:L.ch_xM,font:ff},ticks:{maxTicksLimit:10,font:tf},grid:{color:'#e8e6e1'}},y:{title:{display:true,text:L.ch_yBal,font:ff},ticks:{callback:v=>'$'+v.toFixed(1),font:tf},grid:{color:'#e8e6e1'}}}}}));
}

function setLang(lang){
currentLang=lang;document.documentElement.lang=lang;document.title=T[lang].title;
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
document.getElementById('content').innerHTML=buildHTML();buildCharts();
window.scrollTo({top:0,behavior:'smooth'});
}
setLang('es');
</script>
</body>
</html>
